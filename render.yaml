services:
  - type: web
    name: zhihui-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: ZHIPUAI_API_KEY
        sync: false
    healthCheckPath: /api/v1/health
